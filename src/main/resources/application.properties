spring.application.name=cms
spring.config.import=optional:file:.env[.properties]
server.port=8080
spring.devtools.restart.enabled=false

# ================= DATABASE =================
# ??c t? .env. Fallback ch? důng khi không có .env (ví d? CI/CD)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cms}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================= JPA / HIBERNATE =================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=false
# T?t c?nh báo open-in-view
spring.jpa.open-in-view=false

# ================= FLYWAY =================
# Spring Boot t? ch?y Flyway tr??c khi kh?i t?o JPA vŕ tr??c CommandLineRunner.
# KHÔNG c?n mvn flyway:migrate th? công ? ch? c?n Run t? IntelliJ.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate=false vě DB luôn ???c t?o m?i tr??c khi ch?y app.
# N?u set true, Flyway s? ?ánh d?u DB lŕ "?ă migrate" mŕ không ch?y script
# ? DataSeeder ch?y sau nh?ng b?ng ch?a có ? l?i "relation does not exist".
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.fail-on-missing-locations=true
spring.flyway.out-of-order=false
logging.level.org.flywaydb=WARN

# ================= JWT =================
jwt.secret-b64=${JWT_SECRET_B64:}
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ================= CMS =================
cms.seed.enabled=false
cms.debug.return-reset-token=false

cms.auth.refresh-cookie-name=${CMS_AUTH_REFRESH_COOKIE_NAME:cms_rt}
cms.auth.device-cookie-name=${CMS_AUTH_DEVICE_COOKIE_NAME:cms_did}
cms.auth.cookie.secure=${CMS_AUTH_COOKIE_SECURE:false}
cms.auth.cookie.same-site=${CMS_AUTH_COOKIE_SAMESITE:Strict}
cms.auth.max-sessions-per-user=${CMS_AUTH_MAX_SESSIONS_PER_USER:5}
cms.auth.login.max-failures=${CMS_AUTH_LOGIN_MAX_FAILURES:5}
cms.auth.login.lock-minutes=${CMS_AUTH_LOGIN_LOCK_MINUTES:15}
cms.auth.ratelimit.login.ip.max=${CMS_AUTH_RL_LOGIN_IP_MAX:20}
cms.auth.ratelimit.login.ip.window-seconds=${CMS_AUTH_RL_LOGIN_IP_WINDOW_SECONDS:60}
cms.auth.ratelimit.login.user.max=${CMS_AUTH_RL_LOGIN_USER_MAX:10}
cms.auth.ratelimit.login.user.window-seconds=${CMS_AUTH_RL_LOGIN_USER_WINDOW_SECONDS:300}

# ================= CORS =================
cms.cors.allowed-origins=${CMS_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,http://localhost:8081}

# ================= REDIS =================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ================= RABBITMQ =================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ================= MINIO =================
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket-name=avatars