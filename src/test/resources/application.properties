spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cm}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false

cms.seed.enabled=false

jwt.secret=01234567890123456789012345678901
jwt.expiration=900000
jwt.refresh-expiration=604800000

cms.auth.refresh-cookie-name=cms_rt
cms.auth.device-cookie-name=cms_did
cms.auth.cookie.secure=false
cms.auth.cookie.same-site=Lax
cms.auth.max-sessions-per-user=5
cms.auth.login.max-failures=5
cms.auth.login.lock-minutes=15
cms.auth.ratelimit.login.ip.max=20
cms.auth.ratelimit.login.ip.window-seconds=60
cms.auth.ratelimit.login.user.max=10
cms.auth.ratelimit.login.user.window-seconds=300

minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
